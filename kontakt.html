<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kontakt — Atelier 55</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="page-header" id="pageHeader">
    <div class="header-inner">
      <a href="index.html" class="logo">Atelier 55</a>
      <nav class="nav-links">
        <a href="atelier.html" class="pill-btn">Atelier</a>
        <a href="rent.html" class="pill-btn">Rent</a>
        <a href="kontakt.html" class="pill-btn active">Kontakt</a>
        <a href="rezervace.html" class="pill-btn pill-btn-filled">Rezervace</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="section">
      <div class="section-label">Kontakt</div>
      <h1 class="page-title">Pojďme spolupracovat.</h1>

      <div class="contact-grid">
        <div class="contact-item">
          <div class="contact-label">E-mail</div>
          <div class="contact-value">
            <a href="mailto:info@atelier55.cz">info@atelier55.cz</a>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-label">Telefon</div>
          <div class="contact-value">
            <a href="tel:+420777000000">+420 777 000 000</a>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-label">Adresa</div>
          <div class="contact-value">Ulice 55, Praha 5</div>
        </div>
        <div class="contact-item">
          <div class="contact-label">Instagram</div>
          <div class="contact-value">
            <a href="https://instagram.com/atelier55" target="_blank">@atelier55</a>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-label">Provozní doba</div>
          <div class="contact-value" style="font-size: 1rem; font-style: normal;">
            Po–Pá 8:00–20:00<br>So–Ne na dotaz
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="page-footer">
      <span class="footer-copy">© 2025 Atelier 55</span>
      <a href="rezervace.html" class="pill-btn">Rezervace</a>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
