<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rezervace — Atelier 55</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="page-header" id="pageHeader">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Ateliér 55" class="logo-img">
    </a>
    <nav class="nav-links">
      <a href="atelier.html" class="pill-btn">Atelier</a>
      <a href="rent.html" class="pill-btn">Rent</a>
      <a href="kontakt.html" class="pill-btn">Kontakt</a>
      <a href="rezervace.html" class="pill-btn pill-btn-filled">Rezervace</a>
    </nav>
  </div>
</header>


  <main class="main">
    <section class="section">
      <div class="section-label">Rezervace</div>
      <h1 class="page-title">Vyberte termín.</h1>

      <div class="rezervace-layout">

        <!-- KALENDÁŘ -->
        <div>
          <div class="calendar-wrap">
            <div class="calendar-header">
              <button class="cal-nav" id="prevMonth">&#8592;</button>
              <div class="calendar-month" id="calendarMonth"></div>
              <button class="cal-nav" id="nextMonth">&#8594;</button>
            </div>
            <div class="calendar-weekdays">
              <span>Po</span><span>Út</span><span>St</span>
              <span>Čt</span><span>Pá</span><span>So</span><span>Ne</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="calendar-legend">
              <div class="legend-item">
                <div class="legend-dot available"></div>
                Volný
              </div>
              <div class="legend-item">
                <div class="legend-dot occupied"></div>
                Obsazený
              </div>
            </div>
          </div>
        </div>

        <!-- FORMULÁŘ -->
        <div class="booking-form">
          <div class="booking-form-title">Poptávka rezervace</div>
          <div class="booking-form-subtitle">Vyplňte formulář a ozveme se do 24 hodin.</div>

          <div class="selected-date-display" id="selectedDateDisplay">
            Vyberte datum v kalendáři →
          </div>

          <div id="bookingFormInner">
            <div class="form-group">
              <label class="form-label">Jméno a příjmení</label>
              <input type="text" class="form-input" id="fieldName" placeholder="Jan Novák">
            </div>
            <div class="form-group">
              <label class="form-label">E-mail</label>
              <input type="email" class="form-input" id="fieldEmail" placeholder="jan@email.cz">
            </div>
            <div class="form-group">
              <label class="form-label">Typ pronájmu</label>
              <select class="form-select" id="fieldType">
                <option value="">— Vyberte —</option>
                <option value="puldne">Půlden (4 hod) — 3 500 Kč</option>
                <option value="cely">Celý den (8 hod) — 6 000 Kč</option>
                <option value="vikend">Víkend — na dotaz</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Poznámka</label>
              <textarea class="form-textarea" id="fieldNote" placeholder="Popis projektu, počet osob, speciální požadavky…"></textarea>
            </div>
            <button class="form-submit" id="submitBtn" disabled>Odeslat poptávku</button>
          </div>

          <div class="booking-success" id="bookingSuccess">
            <div class="booking-success-icon">✓</div>
            <div class="booking-success-title">Poptávka odeslána</div>
            <div class="booking-success-text">Ozveme se do 24 hodin na váš e-mail.</div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer>
    <div class="page-footer">
      <span class="footer-copy">© 2025 Atelier 55</span>
      <a href="kontakt.html" class="pill-btn">Kontakt</a>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
